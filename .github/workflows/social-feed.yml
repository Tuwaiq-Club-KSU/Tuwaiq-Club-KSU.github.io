name: Update Social Feed

on:
  schedule:
    - cron: '0 */3 * * *'   # runs every 3 hours
  workflow_dispatch:          # lets you trigger it manually from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch & parse X feed
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, re, html, sys

          INSTANCES = [
              'https://nitter.net/Tuwaiq_KSU/rss',
              'https://nitter.privacydev.net/Tuwaiq_KSU/rss',
              'https://nitter.poast.org/Tuwaiq_KSU/rss',
          ]

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/124.0 Safari/537.36',
              'Accept': 'application/rss+xml, text/xml, */*',
          }

          xml_text = None
          for url in INSTANCES:
              try:
                  req = urllib.request.Request(url, headers=HEADERS)
                  with urllib.request.urlopen(req, timeout=15) as r:
                      text = r.read().decode('utf-8')
                      if '<item>' in text and 'not yet whitelisted' not in text and '1971' not in text:
                          xml_text = text
                          print(f'Got feed from {url}')
                          break
                      else:
                          print(f'Skipped {url} (blocked or empty)')
              except Exception as e:
                  print(f'Failed {url}: {e}')

          posts = []
          if xml_text:
              # Use regex to avoid XML namespace issues entirely
              item_re = re.compile(r'<item>([\s\S]*?)</item>')
              def get_tag(block, tag):
                  m = re.search(r'<' + tag + r'[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?</' + tag + r'>', block)
                  return m.group(1).strip() if m else ''

              for item_m in item_re.finditer(xml_text):
                  if len(posts) >= 3:
                      break
                  block = item_m.group(1)
                  desc  = get_tag(block, 'description')
                  title = get_tag(block, 'title')
                  raw   = desc if desc else title
                  img_m = re.search(r'<img[^>]+src=["\']([^"\']+)["\']', raw)
                  media = img_m.group(1) if img_m else ''
                  text  = html.unescape(re.sub(r'<[^>]+>', '', raw)).strip()
                  link  = get_tag(block, 'link')
                  # Rewrite any nitter domain to x.com
                  link  = re.sub(r'https?://[^/]*nitter[^/]*/','https://x.com/', link)
                  link  = re.sub(r'https?://xcancel\.com/','https://x.com/', link)
                  date  = get_tag(block, 'pubDate')
                  if text and link:
                      posts.append({'text': text, 'link': link, 'date': date, 'media': media})

          import os
          with open('social-feed.json', 'w', encoding='utf-8') as f:
              json.dump(posts, f, ensure_ascii=False, indent=2)

          print(f'Written {len(posts)} posts to social-feed.json')
          PYEOF

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social-feed.json
          git diff --cached --quiet || git commit -m "chore: update social feed [skip ci]"
          git push
